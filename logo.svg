<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f14"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00E5FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- Outer ring glow -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Decorative circuit lines -->
  <g stroke="url(#grad)" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M 30 100 L 55 100 L 65 85 L 80 85"/>
    <path d="M 170 100 L 145 100 L 135 115 L 120 115"/>
    <path d="M 100 30 L 100 55 L 85 65 L 85 80"/>
    <path d="M 100 170 L 100 145 L 115 135 L 115 120"/>
    <circle cx="30" cy="100" r="3" fill="#00E5FF" opacity="0.6"/>
    <circle cx="170" cy="100" r="3" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="100" cy="30" r="3" fill="#00E5FF" opacity="0.6"/>
    <circle cx="100" cy="170" r="3" fill="#8B5CF6" opacity="0.6"/>
  </g>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>

  <!-- "不" character stylized -->
  <g filter="url(#glow)">
    <!-- Main vertical stroke -->
    <rect x="91" y="55" width="10" height="75" rx="5" fill="url(#grad)"/>
    <!-- Top horizontal -->
    <rect x="68" y="55" width="48" height="10" rx="5" fill="url(#grad)"/>
    <!-- Middle horizontal -->
    <rect x="68" y="92" width="36" height="10" rx="5" fill="url(#grad)"/>
    <!-- Bottom horizontal -->
    <rect x="68" y="129" width="48" height="10" rx="5" fill="url(#grad)"/>
  </g>

  <!-- Accent dot - like an AI processing indicator -->
  <circle cx="100" cy="100" r="5" fill="#00E5FF" opacity="0.9" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Top accent -->
  <line x1="85" y1="40" x2="115" y2="40" stroke="url(#glowGrad)" stroke-width="2" opacity="0.7"/>
</svg>
