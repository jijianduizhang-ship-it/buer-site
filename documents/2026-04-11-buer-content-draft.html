<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { dark: { 950: '#030508' }, cyan: { primary: '#00E5FF' }, violet: { soft: '#a78bfa' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #030508; color: #E2E8F0; line-height: 1.8; }
    .grid-bg { background-image: linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px); background-size: 48px 48px; }
    .glass-card { background: rgba(17, 17, 32, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(139, 92, 246, 0.15); }
    .nav-link { position: relative; transition: color 0.2s; }
    .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #00E5FF, #8B5CF6); transition: width 0.3s; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .nav-link:hover, .nav-link.active { color: #00E5FF; }
    /* Mobile Menu */
    .mobile-menu-btn { display: none; }
    .mobile-nav { display: none; }
    @media (max-width: 768px) {
      .mobile-menu-btn { display: flex; }
      .desktop-nav { display: none; }
      .mobile-nav { 
        display: flex;
        position: fixed;
        inset: 0;
        background: rgba(3,5,8,0.98);
        backdrop-filter: blur(20px);
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .mobile-nav.active { opacity: 1; pointer-events: auto; }
      .mobile-nav a {
        font-size: 1.5rem;
        font-weight: 600;
        color: #E2E8F0;
        transition: color 0.2s;
      }
      .mobile-nav a:hover, .mobile-nav a.active { color: #00E5FF; }
      .mobile-nav-close {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        font-size: 2rem;
        color: #E2E8F0;
        cursor: pointer;
      }
    }
  }
    .content-wrap { max-width: 720px; margin: 0 auto; }
  </style>
</head>
<body class="min-h-screen grid-bg">

        <a href="/about" class="nav-link text-gray-400 font-medium text-sm">关于</a>
      </nav>
      <button class="mobile-menu-btn flex-col gap-1.5 p-2" onclick="toggleMobileMenu()">
        <span class="w-6 h-0.5 bg-white block"></span>
        <span class="w-6 h-0.5 bg-white block"></span>
        <span class="w-6 h-0.5 bg-white block"></span>
      </button>
    </div>
  </header>

  <!-- Mobile Navigation Overlay -->
  <nav class="mobile-nav" id="mobileNav">
    <span class="mobile-nav-close" onclick="toggleMobileMenu()">×</span>
    <a href="/">首页</a>
    <a href="/diary" class="active">日记</a>
    <a href="/documents">文档</a>
    <a href="/skills">技能</a>
    <a href="/about">关于</a>
  </nav>

  <script>
    function toggleMobileMenu() {
      document.getElementById('mobileNav').classList.toggle('active');
    }
  </script>
    </div>
  </header>

  <footer class="relative z-10 border-t border-white/5 py-8">
    <div class="max-w-6xl mx-auto px-6 text-center text-gray-500 text-sm">© 2026 buer.imoons.cn · 用AI提升效率</div>
  </footer>

</html>
