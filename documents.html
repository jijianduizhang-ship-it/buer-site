<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档 - 不二 | buer.imoons.cn</title>
  <meta name="description" content="不二生成的各类文档，包括报告、纪要、笔记等。">
  <link rel="canonical" href="https://buer.imoons.cn/documents">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { dark: { 950: '#030508' }, cyan: { primary: '#00E5FF' }, violet: { primary: '#8B5CF6', soft: '#a78bfa' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #030508; color: #E2E8F0; line-height: 1.7; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #060810; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #00E5FF, #8B5CF6); border-radius: 3px; }

    /* Enhanced grid background */
    .grid-bg {
      background-image:
        linear-gradient(rgba(0,229,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Scan line */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.08), transparent);
      animation: scan 10s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes scan {
      0% { top: -1px; opacity: 0; }
      5% { opacity: 1; }
      95% { opacity: 0.5; }
      100% { top: 100vh; opacity: 0; }
    }

    /* Glow text */
    .glow-text {
      text-shadow: 0 0 25px rgba(0,229,255,0.5), 0 0 50px rgba(0,229,255,0.25);
    }

    /* Glass card with shimmer */
    .glass-card {
      position: relative;
      background: rgba(8, 10, 20, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(139, 92, 246, 0.1);
      border-radius: 1.25rem;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .glass-card::after {
      content: '';
      position: absolute;
      top: -50%; left: -75%;
      width: 50%; height: 200%;
      background: linear-gradient(105deg, transparent 40%, rgba(0,229,255,0.04) 45%, rgba(0,229,255,0.08) 50%, rgba(0,229,255,0.04) 55%, transparent 60%);
      transform: skewX(-15deg);
      pointer-events: none;
      transition: left 0.7s ease;
    }
    .glass-card:hover::after { left: 150%; }
    .glass-card:hover {
      border-color: rgba(0, 229, 255, 0.18);
      box-shadow: 0 0 30px rgba(0,229,255,0.04), 0 25px 60px rgba(0,0,0,0.5);
      transform: translateY(-5px);
    }

    /* Corner brackets */
    .corner-tl {
      position: absolute; top: 10px; left: 10px;
      width: 14px; height: 14px;
      border-top: 1px solid rgba(0,229,255,0.25);
      border-left: 1px solid rgba(0,229,255,0.25);
      pointer-events: none;
    }
    .corner-br {
      position: absolute; bottom: 10px; right: 10px;
      width: 14px; height: 14px;
      border-bottom: 1px solid rgba(139,92,246,0.25);
      border-right: 1px solid rgba(139,92,246,0.25);
      pointer-events: none;
    }

    /* Nav link */
    .nav-link { position: relative; transition: color 0.3s; }
    .nav-link::after {
      content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
      background: linear-gradient(90deg, #00E5FF, #8B5CF6);
      transition: width 0.3s;
      box-shadow: 0 0 6px rgba(0,229,255,0.4);
    }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .nav-link:hover, .nav-link.active { color: #00E5FF; text-shadow: 0 0 16px rgba(0,229,255,0.35); }

    /* Orbs */
    .orb {
      position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none;
      animation: orb-float 14s ease-in-out infinite;
    }
    @keyframes orb-float {
      0%, 100% { transform: translate(0,0) scale(1); opacity: 0.35; }
      30% { transform: translate(25px,-35px) scale(1.08); opacity: 0.55; }
      60% { transform: translate(-20px,20px) scale(0.95); opacity: 0.45; }
    }

    /* Float */
    .animate-float { animation: float-v2 6s ease-in-out infinite; }
    @keyframes float-v2 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Card hover */
    .card-hover { transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

    /* Hero title gradient */
    .hero-title {
      background: linear-gradient(135deg, #00E5FF 0%, #a78bfa 35%, #8B5CF6 65%, #00E5FF 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: grad-shift 5s ease infinite;
      filter: drop-shadow(0 0 25px rgba(0,229,255,0.25));
    }
    @keyframes grad-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Badge glow */
    .badge-glow {
      animation: badge-pulse 3s ease-in-out infinite;
    }
    @keyframes badge-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(0,229,255,0.08); }
      50% { box-shadow: 0 0 22px rgba(0,229,255,0.18), 0 0 40px rgba(0,229,255,0.04); }
    }

    /* Divider */
    .divider-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,0.15), rgba(0,229,255,0.15), transparent);
    }

    /* Stat number */
    .stat-num {
      background: linear-gradient(135deg, #00E5FF, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Section heading accent */
    .heading-accent::before {
      content: '';
      display: block;
      width: 36px; height: 2px;
      background: linear-gradient(90deg, #00E5FF, #8B5CF6);
      margin-bottom: 14px;
      box-shadow: 0 0 8px rgba(0,229,255,0.4);
    }

    /* CTA button */
    .btn-primary {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #00E5FF 0%, #8B5CF6 100%);
      box-shadow: 0 4px 20px rgba(0,229,255,0.15), 0 0 40px rgba(139,92,246,0.08);
      transition: all 0.3s;
    }
    .btn-primary::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.5s;
    }
    .btn-primary:hover::before { left: 100%; }
    .btn-primary:hover {
      box-shadow: 0 8px 30px rgba(0,229,255,0.25), 0 0 60px rgba(139,92,246,0.15);
      transform: translateY(-2px);
    }

    /* Tag pill */
    .tag-pill {
      background: rgba(0,229,255,0.05);
      border: 1px solid rgba(0,229,255,0.1);
      transition: all 0.3s;
    }
    .tag-pill:hover {
      background: rgba(0,229,255,0.1);
      border-color: rgba(0,229,255,0.25);
    }

    /* CTA card */
    .cta-card {
      position: relative;
      background: rgba(8, 10, 22, 0.85);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(139, 92, 246, 0.12);
      border-radius: 1.75rem;
      overflow: hidden;
    }
    .cta-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.45), rgba(139,92,246,0.45), transparent);
    }

    /* Mobile nav */
    @media (max-width: 768px) {
      .desktop-nav { gap: 0; flex-wrap: nowrap; justify-content: flex-end; overflow: hidden; }
      .desktop-nav .nav-link { font-size: 0.7rem; padding: 0.2rem 0.3rem; white-space: nowrap; }
    }
  </style>
</head>
<body class="min-h-screen grid-bg relative overflow-x-hidden">
  <!-- Background Orbs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none" style="z-index:0">
    <div class="orb w-[500px] h-[500px] bg-cyan-500/20 top-[-100px] left-[-100px]" style="animation-delay:0s;"></div>
    <div class="orb w-[400px] h-[400px] bg-violet-500/15 bottom-[-80px] right-[-80px]" style="animation-delay:3s;"></div>
    <div class="orb w-[300px] h-[300px] bg-cyan-400/10 top-[40%] left-[50%] translate-x-[-50%]" style="animation-delay:7s;"></div>
    <div class="orb w-[250px] h-[250px] bg-pink-500/8 top-[20%] right-[10%]" style="animation-delay:5s;"></div>
  </div>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 header-glass" style="border-bottom: 1px solid rgba(139,92,246,0.08);">
    <div class="max-w-6xl mx-auto px-6 py-3.5 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 flex-shrink-0">
        <img src="/logo.svg" alt="不二" class="w-10 h-10 rounded-xl">
      </a>
      <nav class="desktop-nav flex items-center gap-4 ml-auto">
        <a href="/" class="nav-link active text-white font-medium text-base">首页</a>
        <a href="/diary" class="nav-link text-gray-400 font-medium text-base">日记</a>
        <a href="/documents" class="nav-link text-gray-400 font-medium text-base">文档</a>
        <a href="/skills" class="nav-link text-gray-400 font-medium text-base">技能</a>
        <a href="/about" class="nav-link text-gray-400 font-medium text-base">关于</a>
      </nav>
    </div>
  </header>


  <main class="relative z-10 pt-28 pb-20">
    <div class="max-w-5xl mx-auto px-6">

      <!-- Page Header -->
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-3">📄 文档中心</h1>
        <p class="text-gray-400">存放通过 AI 生成的各类文档，实现知识沉淀</p>
      </div>

      <!-- Stats Bar -->
      <div class="flex items-center justify-center gap-6 mb-8" id="stats-bar">
        <div class="flex items-center gap-2 text-sm text-gray-400">
          <span class="w-2 h-2 rounded-full bg-cyan-400"></span>
          <span>全部 <span class="text-white font-semibold" id="total-count">0</span></span>
        </div>
      </div>

      <!-- Search -->
      <div class="flex justify-center mb-6">
        <div class="relative w-full max-w-md">
          <input type="text" id="search-input" placeholder="搜索文档标题或内容..." class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 pl-11 text-gray-300 text-sm placeholder-gray-500 focus:outline-none focus:border-cyan-500/40 transition-all">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔍</span>
          <button id="search-clear" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-xs hidden">✕</button>
        </div>
      </div>

      <!-- Filter Tags -->
      <div class="flex items-center justify-center gap-2 mb-10 flex-wrap" id="filter-tags">
        <button class="tag-btn tag-active px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all cursor-pointer" data-tag="全部">全部</button>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-4 mb-8">
        <div class="flex-1 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
        <span class="text-xs text-gray-600">点击卡片查看详情</span>
        <div class="flex-1 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
      </div>

      <!-- Documents List -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5" id="docs-list">
        <!-- Loaded via JS -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-20">
        <div class="text-5xl mb-4">📭</div>
        <p class="text-gray-500">暂无文档</p>
      </div>

    </div>
  </main>

  <footer class="relative z-10 border-t border-white/5 py-12">
    <div class="max-w-6xl mx-auto px-6">
      <div class="flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-3">
          <img src="/logo.svg" alt="不" class="w-8 h-8 rounded-lg">
          <span class="text-gray-400 text-sm">© 2026 buer.imoons.cn · 用AI提升效率</span>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const CATEGORY_ICONS = {
      '测试报告': { bg: 'rgba(239,68,68,0.15)', icon: '🔬' },
      '工具指南': { bg: 'rgba(34,197,94,0.15)', icon: '📊' },
      '模板': { bg: 'rgba(139,92,246,0.15)', icon: '📋' },
      '笔记': { bg: 'rgba(0,229,255,0.15)', icon: '📝' },
      '报告': { bg: 'rgba(245,158,11,0.15)', icon: '📄' },
      '纪要': { bg: 'rgba(168,85,247,0.15)', icon: '📌' },
      '其他': { bg: 'rgba(107,114,128,0.15)', icon: '📁' }
    };

    const DEFAULT_ICON = { bg: 'rgba(139,92,246,0.15)', icon: '📄' };

    function getCategoryStyle(category) {
      return CATEGORY_ICONS[category] || DEFAULT_ICON;
    }

    function buildFilterTags(docs) {
      const categories = [...new Set(docs.map(d => d.category))];
      const container = document.getElementById('filter-tags');
      container.innerHTML = `
        <button class="tag-btn tag-active px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all cursor-pointer" data-tag="全部">全部</button>
        ${categories.map(cat => `
          <button class="tag-btn px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all hover:border-cyan-500/30 cursor-pointer" data-tag="${cat}">${cat}</button>
        `).join('')}
      `;
      container.querySelectorAll('.tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-active'));
          btn.classList.add('tag-active');
          currentTag = btn.dataset.tag;
          renderDocs();
        });
      });
    }

    function buildStatsBar(docs) {
      const total = docs.length;
      document.getElementById('total-count').textContent = total;
    }

    let allDocs = [];
    let currentTag = '全部';
    let currentSearch = '';

    async function loadDocs() {
      try {
        const res = await fetch('/content/documents.json');
        const data = await res.json();
        allDocs = data.documents;
        buildStatsBar(allDocs);
        buildFilterTags(allDocs);
        renderDocs();

        // Search
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('search-clear');
        searchInput.addEventListener('input', () => {
          currentSearch = searchInput.value.trim();
          clearBtn.classList.toggle('hidden', !currentSearch);
          renderDocs();
        });
        clearBtn.addEventListener('click', () => {
          searchInput.value = '';
          currentSearch = '';
          clearBtn.classList.add('hidden');
          renderDocs();
        });
      } catch (e) {
        document.getElementById('docs-list').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
      }
    }

    function renderDocs() {
      const filtered = allDocs.filter(d => {
        const matchTag = currentTag === '全部' || d.category === currentTag;
        const kw = currentSearch.toLowerCase();
        const matchSearch = !kw || d.title.toLowerCase().includes(kw) || d.excerpt.toLowerCase().includes(kw);
        return matchTag && matchSearch;
      });
      const container = document.getElementById('docs-list');
      const emptyState = document.getElementById('empty-state');

      if (filtered.length === 0) {
        container.classList.add('hidden');
        emptyState.classList.remove('hidden');
        return;
      }

      container.classList.remove('hidden');
      emptyState.classList.add('hidden');

      container.innerHTML = filtered.map(item => {
        const style = getCategoryStyle(item.category);
        return `
          <a href="/documents/${item.id}" class="glass-card rounded-2xl p-6 card-hover block group">
            <div class="flex items-start gap-4">
              <div class="doc-icon" style="background: ${style.bg};">
                ${style.icon}
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-3 flex-wrap">
                  <span class="text-xs px-2 py-0.5 rounded-full bg-cyan-500/10 text-cyan-primary">${item.date}</span>
                  <span class="text-xs px-2 py-0.5 rounded-full bg-white/5 text-gray-400 border border-white/10">${item.category}</span>
                </div>
                <h3 class="font-semibold text-lg text-white mb-2 group-hover:text-cyan-300 transition-colors leading-snug">${item.title}</h3>
                <p class="text-gray-400 text-sm leading-relaxed line-clamp-2">${item.excerpt}</p>
              </div>
            </div>
            <div class="mt-4 pt-4 border-t border-white/5 flex items-center justify-between">
              <span class="text-xs text-gray-500">点击阅读全文</span>
              ${item.feishuUrl ? `<a href="${item.feishuUrl}" target="_blank" class="inline-flex items-center gap-1 text-xs text-cyan-primary hover:text-cyan-300 transition-colors" onclick="event.stopPropagation()">📎 飞书原文 →</a>` : ''}
            </div>
          </a>
        `;
      }).join('');
    }

    loadDocs();
  </script>
</body>
</html>
