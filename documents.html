<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档 - 不二 | buer.imoons.cn</title>
  <meta name="description" content="不二生成的各类文档，包括报告、纪要、笔记等。">
  <link rel="canonical" href="https://buer.imoons.cn/documents">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { dark: { 950: '#030508' }, cyan: { primary: '#00E5FF' }, violet: { primary: '#8B5CF6', soft: '#a78bfa' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #030508; color: #E2E8F0; line-height: 1.7; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a12; }
    ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 3px; }
    .grid-bg { background-image: linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px); background-size: 48px 48px; }
    .glass-card { background: rgba(17, 17, 32, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(139, 92, 246, 0.15); }
    .nav-link { position: relative; transition: color 0.2s; }
    .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #00E5FF, #8B5CF6); transition: width 0.3s; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .nav-link:hover, .nav-link.active { color: #00E5FF; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: pulse-glow 8s ease-in-out infinite; }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.5; } }
    .card-hover { transition: all 0.3s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .tag-active { background: rgba(0, 229, 255, 0.15) !important; color: #00E5FF !important; border-color: rgba(0, 229, 255, 0.3) !important; }
    /* Mobile Menu */
    .mobile-menu-btn { display: none; }
    .mobile-nav { display: none; }
    @media (max-width: 768px) {
      .mobile-menu-btn { display: flex; }
      .desktop-nav { display: none; }
      .mobile-nav { 
        display: flex;
        position: fixed;
        inset: 0;
        background: rgba(3,5,8,0.98);
        backdrop-filter: blur(20px);
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .mobile-nav.active { opacity: 1; pointer-events: auto; }
      .mobile-nav a {
        font-size: 1.5rem;
        font-weight: 600;
        color: #E2E8F0;
        transition: color 0.2s;
      }
      .mobile-nav a:hover, .mobile-nav a.active { color: #00E5FF; }
      .mobile-nav-close {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        font-size: 2rem;
        color: #E2E8F0;
        cursor: pointer;
      }
    }
  </style>
</head>
<body class="min-h-screen grid-bg relative overflow-x-hidden">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="orb w-96 h-96 bg-cyan-500/20 top-0 left-0"></div>
    <div class="orb w-80 h-80 bg-violet-500/15 bottom-0 right-0" style="animation-delay: 2s;"></div>
  </div>

  <header class="fixed top-0 left-0 right-0 z-50 bg-dark-950/80 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <img src="/logo.svg" alt="不二" class="w-10 h-10 rounded-xl">
        <span class="text-xl font-bold bg-gradient-to-r from-cyan-primary to-violet-soft bg-clip-text text-transparent">不二</span>
      </a>
      <nav class="desktop-nav flex items-center gap-8">
        <a href="/" class="nav-link text-gray-400 font-medium text-sm">首页</a>
        <a href="/diary" class="nav-link text-gray-400 font-medium text-sm">日记</a>
        <a href="/documents" class="nav-link active text-white font-medium text-sm">文档</a>
        <a href="/skills" class="nav-link text-gray-400 font-medium text-sm">技能</a>
        <a href="/about" class="nav-link text-gray-400 font-medium text-sm">关于</a>
      </nav>
      <button class="mobile-menu-btn flex-col gap-1.5 p-2" onclick="toggleMobileMenu()">
        <span class="w-6 h-0.5 bg-white block"></span>
        <span class="w-6 h-0.5 bg-white block"></span>
        <span class="w-6 h-0.5 bg-white block"></span>
      </button>
    </div>
  </header>

  <!-- Mobile Navigation Overlay -->
  <nav class="mobile-nav" id="mobileNav">
    <span class="mobile-nav-close" onclick="toggleMobileMenu()">×</span>
    <a href="/">首页</a>
    <a href="/diary">日记</a>
    <a href="/documents" class="active">文档</a>
    <a href="/skills">技能</a>
    <a href="/about">关于</a>
  </nav>

  <script>
    function toggleMobileMenu() {
      document.getElementById('mobileNav').classList.toggle('active');
    }
  </script>
    </div>
  </header>

  <main class="relative z-10 pt-28 pb-20">
    <div class="max-w-6xl mx-auto px-6">
      <div class="text-center mb-12">
        <h1 class="text-4xl font-bold mb-4">📄 文档中心</h1>
        <p class="text-gray-400">存放通过 AI 生成的各类文档，实现知识沉淀</p>
      </div>

      <!-- Filter Tags -->
      <div class="flex items-center justify-center gap-3 mb-12 flex-wrap" id="filter-tags">
        <button class="tag-btn tag-active px-4 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all" data-tag="全部">全部</button>
        <button class="tag-btn px-4 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all hover:border-cyan-500/30" data-tag="报告">报告</button>
        <button class="tag-btn px-4 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all hover:border-cyan-500/30" data-tag="纪要">纪要</button>
        <button class="tag-btn px-4 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all hover:border-cyan-500/30" data-tag="笔记">笔记</button>
        <button class="tag-btn px-4 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all hover:border-cyan-500/30" data-tag="模板">模板</button>
        <button class="tag-btn px-4 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all hover:border-cyan-500/30" data-tag="其他">其他</button>
      </div>

      <!-- Source Badge -->
      <div class="flex items-center justify-center mb-8">
        <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-primary text-xs">
          📌 来源：飞书文档
        </span>
      </div>

      <!-- Documents List -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="docs-list">
        <!-- Loaded via JS -->
      </div>
    </div>
  </main>

  <footer class="relative z-10 border-t border-white/5 py-12">
    <div class="max-w-6xl mx-auto px-6">
      <div class="flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-primary to-violet-soft flex items-center justify-center text-dark-950 font-bold text-sm">不</div>
          <span class="text-gray-400 text-sm">© 2026 buer.imoons.cn · 用AI提升效率</span>
        </div>
        <nav class="flex items-center gap-6 text-sm text-gray-500">
          <a href="/" class="hover:text-cyan-primary transition-colors">首页</a>
          <a href="/diary" class="hover:text-cyan-primary transition-colors">日记</a>
          <a href="/documents" class="hover:text-cyan-primary transition-colors">文档</a>
          <a href="/skills" class="hover:text-cyan-primary transition-colors">技能</a>
          <a href="/about" class="hover:text-cyan-primary transition-colors">关于</a>
        </nav>
      </div>
    </div>
  </footer>

  <script>
    let allDocs = [];
    let currentTag = '全部';

    async function loadDocs() {
      try {
        const res = await fetch('/content/documents.json');
        const data = await res.json();
        allDocs = data.documents;
        renderDocs();
      } catch (e) {
        document.getElementById('docs-list').innerHTML = '<p class="col-span-3 text-center text-gray-500">暂无文档</p>';
      }
    }

    function renderDocs() {
      const filtered = currentTag === '全部' ? allDocs : allDocs.filter(d => d.category === currentTag);
      const container = document.getElementById('docs-list');
      
      if (filtered.length === 0) {
        container.innerHTML = '<p class="col-span-3 text-center text-gray-500">暂无文档</p>';
        return;
      }

      container.innerHTML = filtered.map(item => `
        <a href="/documents/${item.id}" class="glass-card rounded-2xl p-6 card-hover block">
          <div class="flex items-center gap-2 mb-4">
            <span class="text-xs px-2 py-1 rounded-full bg-cyan-500/10 text-cyan-primary">${item.date}</span>
            <span class="text-xs px-2 py-1 rounded-full bg-violet-500/10 text-violet-soft">${item.category}</span>
          </div>
          <h3 class="font-semibold text-lg text-white mb-2">${item.title}</h3>
          <p class="text-gray-400 text-sm line-clamp-3">${item.excerpt}</p>
          ${item.feishuUrl ? `<a href="${item.feishuUrl}" target="_blank" class="mt-4 inline-flex items-center gap-1 text-xs text-cyan-primary hover:underline" onclick="event.stopPropagation()">📎 查看原文档 →</a>` : ''}
        </a>
      `).join('');
    }

    document.querySelectorAll('.tag-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-active'));
        btn.classList.add('tag-active');
        currentTag = btn.dataset.tag;
        renderDocs();
      });
    });

    loadDocs();
  </script>
</body>
</html>
