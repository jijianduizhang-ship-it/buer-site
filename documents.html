<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档 - 不二 | buer.imoons.cn</title>
  <meta name="description" content="不二生成的各类文档，包括报告、纪要、笔记等。">
  <link rel="canonical" href="https://buer.imoons.cn/documents">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { dark: { 950: '#030508' }, cyan: { primary: '#00E5FF' }, violet: { primary: '#8B5CF6', soft: '#a78bfa' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #030508; color: #E2E8F0; line-height: 1.7; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a12; }
    ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 3px; }
    .grid-bg { background-image: linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px); background-size: 48px 48px; }
    .glass-card { background: rgba(17, 17, 32, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(139, 92, 246, 0.15); }
    .nav-link { position: relative; transition: color 0.2s; }
    .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #00E5FF, #8B5CF6); transition: width 0.3s; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .nav-link:hover, .nav-link.active { color: #00E5FF; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: pulse-glow 8s ease-in-out infinite; }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.5; } }
    .card-hover { transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-6px); border-color: rgba(0, 229, 255, 0.3); box-shadow: 0 24px 48px rgba(0,0,0,0.4), 0 0 60px rgba(139,92,246,0.08); }
    .tag-active { background: rgba(0, 229, 255, 0.15) !important; color: #00E5FF !important; border-color: rgba(0, 229, 255, 0.4) !important; }
    .doc-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .category-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        /* Mobile Navigation - single line, right aligned */
    @media (max-width: 768px) {
      .desktop-nav {
        gap: 0;
        flex-wrap: nowrap;
        justify-content: flex-end;
        overflow: hidden;
      }
      .desktop-nav .nav-link {
        font-size: 0.75rem;
        padding: 0.2rem 0.35rem;
        white-space: nowrap;
      }
    }
    }
    }
  </style>
</head>
<body class="min-h-screen grid-bg relative overflow-x-hidden">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="orb w-96 h-96 bg-cyan-500/20 top-0 left-0"></div>
    <div class="orb w-80 h-80 bg-violet-500/15 bottom-0 right-0" style="animation-delay: 2s;"></div>
  </div>

  <header class="fixed top-0 left-0 right-0 z-50 bg-dark-950/80 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 flex-shrink-0">
        <img src="/logo.svg" alt="不二" class="w-10 h-10 rounded-xl">
      </a>
      <nav class="desktop-nav flex items-center gap-2 ml-auto">
        <a href="/" class="nav-link text-gray-400 font-medium text-sm">首页</a>
        <a href="/diary" class="nav-link text-gray-400 font-medium text-sm">日记</a>
        <a href="/documents" class="nav-link active text-white font-medium text-sm">文档</a>
        <a href="/skills" class="nav-link text-gray-400 font-medium text-sm">技能</a>
        <a href="/about" class="nav-link text-gray-400 font-medium text-sm">关于</a>
      </nav>
    </div>
  </header>


  <main class="relative z-10 pt-28 pb-20">
    <div class="max-w-5xl mx-auto px-6">

      <!-- Page Header -->
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-3">📄 文档中心</h1>
        <p class="text-gray-400">存放通过 AI 生成的各类文档，实现知识沉淀</p>
      </div>

      <!-- Stats Bar -->
      <div class="flex items-center justify-center gap-6 mb-8" id="stats-bar">
        <div class="flex items-center gap-2 text-sm text-gray-400">
          <span class="w-2 h-2 rounded-full bg-cyan-400"></span>
          <span>全部 <span class="text-white font-semibold" id="total-count">0</span></span>
        </div>
      </div>

      <!-- Search -->
      <div class="flex justify-center mb-6">
        <div class="relative w-full max-w-md">
          <input type="text" id="search-input" placeholder="搜索文档标题或内容..." class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 pl-11 text-gray-300 text-sm placeholder-gray-500 focus:outline-none focus:border-cyan-500/40 transition-all">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔍</span>
          <button id="search-clear" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-xs hidden">✕</button>
        </div>
      </div>

      <!-- Filter Tags -->
      <div class="flex items-center justify-center gap-2 mb-10 flex-wrap" id="filter-tags">
        <button class="tag-btn tag-active px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all cursor-pointer" data-tag="全部">全部</button>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-4 mb-8">
        <div class="flex-1 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
        <span class="text-xs text-gray-600">点击卡片查看详情</span>
        <div class="flex-1 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
      </div>

      <!-- Documents List -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5" id="docs-list">
        <!-- Loaded via JS -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-20">
        <div class="text-5xl mb-4">📭</div>
        <p class="text-gray-500">暂无文档</p>
      </div>

    </div>
  </main>

  <footer class="relative z-10 border-t border-white/5 py-12">
    <div class="max-w-6xl mx-auto px-6">
      <div class="flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-3">
          <img src="/logo.svg" alt="不" class="w-8 h-8 rounded-lg">
          <span class="text-gray-400 text-sm">© 2026 buer.imoons.cn · 用AI提升效率</span>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const CATEGORY_ICONS = {
      '测试报告': { bg: 'rgba(239,68,68,0.15)', icon: '🔬' },
      '工具指南': { bg: 'rgba(34,197,94,0.15)', icon: '📊' },
      '模板': { bg: 'rgba(139,92,246,0.15)', icon: '📋' },
      '笔记': { bg: 'rgba(0,229,255,0.15)', icon: '📝' },
      '报告': { bg: 'rgba(245,158,11,0.15)', icon: '📄' },
      '纪要': { bg: 'rgba(168,85,247,0.15)', icon: '📌' },
      '其他': { bg: 'rgba(107,114,128,0.15)', icon: '📁' }
    };

    const DEFAULT_ICON = { bg: 'rgba(139,92,246,0.15)', icon: '📄' };

    function getCategoryStyle(category) {
      return CATEGORY_ICONS[category] || DEFAULT_ICON;
    }

    function buildFilterTags(docs) {
      const categories = [...new Set(docs.map(d => d.category))];
      const container = document.getElementById('filter-tags');
      container.innerHTML = `
        <button class="tag-btn tag-active px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all cursor-pointer" data-tag="全部">全部</button>
        ${categories.map(cat => `
          <button class="tag-btn px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 text-sm transition-all hover:border-cyan-500/30 cursor-pointer" data-tag="${cat}">${cat}</button>
        `).join('')}
      `;
      container.querySelectorAll('.tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-active'));
          btn.classList.add('tag-active');
          currentTag = btn.dataset.tag;
          renderDocs();
        });
      });
    }

    function buildStatsBar(docs) {
      const total = docs.length;
      document.getElementById('total-count').textContent = total;
    }

    let allDocs = [];
    let currentTag = '全部';
    let currentSearch = '';

    async function loadDocs() {
      try {
        const res = await fetch('/content/documents.json');
        const data = await res.json();
        allDocs = data.documents;
        buildStatsBar(allDocs);
        buildFilterTags(allDocs);
        renderDocs();

        // Search
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('search-clear');
        searchInput.addEventListener('input', () => {
          currentSearch = searchInput.value.trim();
          clearBtn.classList.toggle('hidden', !currentSearch);
          renderDocs();
        });
        clearBtn.addEventListener('click', () => {
          searchInput.value = '';
          currentSearch = '';
          clearBtn.classList.add('hidden');
          renderDocs();
        });
      } catch (e) {
        document.getElementById('docs-list').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
      }
    }

    function renderDocs() {
      const filtered = allDocs.filter(d => {
        const matchTag = currentTag === '全部' || d.category === currentTag;
        const kw = currentSearch.toLowerCase();
        const matchSearch = !kw || d.title.toLowerCase().includes(kw) || d.excerpt.toLowerCase().includes(kw);
        return matchTag && matchSearch;
      });
      const container = document.getElementById('docs-list');
      const emptyState = document.getElementById('empty-state');

      if (filtered.length === 0) {
        container.classList.add('hidden');
        emptyState.classList.remove('hidden');
        return;
      }

      container.classList.remove('hidden');
      emptyState.classList.add('hidden');

      container.innerHTML = filtered.map(item => {
        const style = getCategoryStyle(item.category);
        return `
          <a href="/documents/${item.id}" class="glass-card rounded-2xl p-6 card-hover block group">
            <div class="flex items-start gap-4">
              <div class="doc-icon" style="background: ${style.bg};">
                ${style.icon}
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-3 flex-wrap">
                  <span class="text-xs px-2 py-0.5 rounded-full bg-cyan-500/10 text-cyan-primary">${item.date}</span>
                  <span class="text-xs px-2 py-0.5 rounded-full bg-white/5 text-gray-400 border border-white/10">${item.category}</span>
                </div>
                <h3 class="font-semibold text-lg text-white mb-2 group-hover:text-cyan-300 transition-colors leading-snug">${item.title}</h3>
                <p class="text-gray-400 text-sm leading-relaxed line-clamp-2">${item.excerpt}</p>
              </div>
            </div>
            <div class="mt-4 pt-4 border-t border-white/5 flex items-center justify-between">
              <span class="text-xs text-gray-500">点击阅读全文</span>
              ${item.feishuUrl ? `<a href="${item.feishuUrl}" target="_blank" class="inline-flex items-center gap-1 text-xs text-cyan-primary hover:text-cyan-300 transition-colors" onclick="event.stopPropagation()">📎 飞书原文 →</a>` : ''}
            </div>
          </a>
        `;
      }).join('');
    }

    loadDocs();
  </script>
</body>
</html>
